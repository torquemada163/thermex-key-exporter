name: Publish Python CLI to PyPI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing release tag that exactly matches pyproject.toml, for example v0.1.0
        required: true
        type: string
      publish:
        description: Upload to PyPI after the build and smoke tests pass
        required: true
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  build:
    name: Build and verify Python distributions
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    # The protected environment supplies the private build profile. Configure
    # manual reviewers before enabling this workflow for an actual release.
    environment: pypi

    steps:
      - name: Check out release tag
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install release tools
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"

      - name: Verify the release tag and metadata
        env:
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
        run: python scripts/check_release_version.py --tag "$RELEASE_TAG"

      - name: Restore protected release profile
        shell: bash
        env:
          PROFILE_PATH: ${{ runner.temp }}/thermex-profile.json
          THERMEX_PROFILE_B64: ${{ secrets.THERMEX_PROFILE_B64 }}
        run: |
          if [ -z "$THERMEX_PROFILE_B64" ]; then
            echo "::error::THERMEX_PROFILE_B64 must be configured as a protected pypi environment secret."
            exit 1
          fi
          python -c "import base64, os, pathlib; pathlib.Path(os.environ['PROFILE_PATH']).write_bytes(base64.b64decode(os.environ['THERMEX_PROFILE_B64']))"
          chmod 600 "$PROFILE_PATH"
          echo "THERMEX_PROFILE_PATH=$PROFILE_PATH" >> "$GITHUB_ENV"

      - name: Build and verify release distributions
        run: |
          python scripts/build_python_distribution.py --profile "$THERMEX_PROFILE_PATH" --clean
          python scripts/check_python_distribution.py --dist-dir dist/python --expect-profile --pipx

      - name: Upload verified distributions for the publishing job
        uses: actions/upload-artifact@v7
        with:
          name: python-distributions
          path: dist/python/
          if-no-files-found: error
          retention-days: 1

  publish:
    name: Upload verified distributions to PyPI
    needs: build
    if: github.event_name == 'push' || github.event.inputs.publish == 'true'
    runs-on: ubuntu-22.04
    environment:
      name: pypi
      url: https://pypi.org/project/thermex-key-exporter/
    permissions:
      id-token: write

    steps:
      - name: Download verified distributions
        uses: actions/download-artifact@v8
        with:
          name: python-distributions
          path: dist/python

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/python
