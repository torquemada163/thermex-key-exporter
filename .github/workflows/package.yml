name: Package

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  package:
    name: Package ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            label: linux-x64
            build_cli: true
            build_gui: false
          - os: windows-2022
            label: windows-x64
            build_cli: true
            build_gui: true
          - os: macos-14
            label: macos-arm64
            build_cli: false
            build_gui: true

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install project
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"

      - name: Run release checks
        run: |
          python -m pytest -q
          python -m thermex_key_exporter self-test
          python -m ruff check src tests scripts packaging
          python -m ruff format --check src tests scripts packaging
          python scripts/check_text_policy.py

      - name: Restore optional private release profile
        id: profile
        shell: bash
        run: |
          if [ -z "$THERMEX_PROFILE_B64" ]; then
            if [ "$IS_TAG_RELEASE" = "true" ]; then
              echo "::error::THERMEX_PROFILE_B64 is required to build a tagged public release."
              exit 1
            fi
            echo "kind=developer-no-profile" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          profile_path="$RUNNER_TEMP/thermex-profile.json"
          python -c "import base64, os, pathlib; pathlib.Path(os.environ['PROFILE_PATH']).write_bytes(base64.b64decode(os.environ['THERMEX_PROFILE_B64']))"
          chmod 600 "$profile_path"
          echo "THERMEX_PROFILE_PATH=$profile_path" >> "$GITHUB_ENV"
          echo "kind=release-profile" >> "$GITHUB_OUTPUT"
        env:
          IS_TAG_RELEASE: ${{ github.event_name == 'push' }}
          PROFILE_PATH: ${{ runner.temp }}/thermex-profile.json
          THERMEX_PROFILE_B64: ${{ secrets.THERMEX_PROFILE_B64 }}

      - name: Verify GUI runtime dependency
        if: matrix.build_gui
        run: python -c "import tkinter; print(tkinter.TkVersion)"

      - name: Build CLI distribution
        if: matrix.build_cli
        run: python -m PyInstaller packaging/thermex-key-exporter-cli.spec --noconfirm --clean

      - name: Verify CLI bundle excludes Pillow
        if: matrix.build_cli
        shell: bash
        run: |
          python -c "from pathlib import Path; import sys; root = Path('dist/thermex-key-exporter'); matches = [path for path in root.rglob('*') if 'PIL' in path.parts]; print('\\n'.join(str(path) for path in matches)); sys.exit(bool(matches))"

      - name: Smoke-test CLI distribution
        if: matrix.build_cli
        shell: bash
        env:
          PROFILE_KIND: ${{ steps.profile.outputs.kind }}
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            executable="dist/thermex-key-exporter/thermex-key-exporter.exe"
          else
            executable="dist/thermex-key-exporter/thermex-key-exporter"
          fi
          "$executable" --version
          "$executable" self-test
          if [ "$PROFILE_KIND" = "release-profile" ]; then
            "$executable" profile-status
          fi

      - name: Build GUI distribution
        if: matrix.build_gui
        run: python -m PyInstaller packaging/thermex-key-exporter-gui.spec --noconfirm --clean

      - name: Smoke-test GUI distribution imports
        if: matrix.build_gui
        shell: bash
        env:
          THERMEX_GUI_IMPORT_CHECK: "1"
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            executable="dist/ThermexKeyExporter/ThermexKeyExporter.exe"
          elif [ "$RUNNER_OS" = "macOS" ]; then
            executable="dist/ThermexKeyExporter.app/Contents/MacOS/ThermexKeyExporter"
          else
            executable="dist/ThermexKeyExporter/ThermexKeyExporter"
          fi
          "$executable"

      - name: Verify macOS application bundle signatures
        if: runner.os == 'macOS'
        shell: bash
        run: |
          codesign --verify --deep --strict --verbose=2 dist/ThermexKeyExporter.app

      - name: Verify embedded release profile
        if: steps.profile.outputs.kind == 'release-profile'
        run: python -c "from pathlib import Path; assert list(Path('dist').rglob('thermex-profile.json'))"

      - name: Package macOS release archive
        if: runner.os == 'macOS'
        shell: bash
        env:
          PLATFORM: ${{ matrix.label }}
        run: |
          mkdir -p release
          archive_name="thermex-key-exporter-${PLATFORM}.zip"
          archive="release/$archive_name"
          staging="$(mktemp -d)"
          ditto dist/ThermexKeyExporter.app "$staging/ThermexKeyExporter.app"
          ditto -c -k --sequesterRsrc "$staging" "$archive"
          rm -rf "$staging"
          (
            cd release
            shasum -a 256 "$archive_name" > SHA256SUMS.txt
          )

      - name: Verify macOS release archive
        if: runner.os == 'macOS'
        shell: bash
        env:
          PLATFORM: ${{ matrix.label }}
        run: |
          archive="release/thermex-key-exporter-${PLATFORM}.zip"
          extracted="$(mktemp -d)"
          ditto -x -k "$archive" "$extracted"
          codesign --verify --deep --strict --verbose=2 "$extracted/ThermexKeyExporter.app"
          unexpected="$(find "$extracted" -mindepth 1 -maxdepth 1 ! -name ThermexKeyExporter.app -print -quit)"
          if [ -n "$unexpected" ]; then
            echo "macOS GUI archive contains an unexpected top-level entry"
            exit 1
          fi
          THERMEX_GUI_IMPORT_CHECK=1 "$extracted/ThermexKeyExporter.app/Contents/MacOS/ThermexKeyExporter"

      - name: Package Linux release archive
        if: runner.os == 'Linux'
        shell: bash
        env:
          PLATFORM: ${{ matrix.label }}
        run: |
          mkdir -p release
          archive_name="thermex-key-exporter-${PLATFORM}.tar.gz"
          archive="release/$archive_name"
          tar -C dist -czf "$archive" thermex-key-exporter
          (
            cd release
            sha256sum "$archive_name" > SHA256SUMS.txt
          )

      - name: Verify Linux release archive
        if: runner.os == 'Linux'
        shell: bash
        env:
          PLATFORM: ${{ matrix.label }}
          PROFILE_KIND: ${{ steps.profile.outputs.kind }}
        run: |
          archive="release/thermex-key-exporter-${PLATFORM}.tar.gz"
          extracted="$(mktemp -d)"
          tar -xzf "$archive" -C "$extracted"
          test -x "$extracted/thermex-key-exporter/thermex-key-exporter"
          unexpected="$(find "$extracted" -mindepth 1 -maxdepth 1 ! -name thermex-key-exporter -print -quit)"
          if [ -n "$unexpected" ]; then
            echo "Linux CLI archive contains an unexpected top-level entry"
            exit 1
          fi
          executable="$extracted/thermex-key-exporter/thermex-key-exporter"
          "$executable" --version
          "$executable" self-test
          if [ "$PROFILE_KIND" = "release-profile" ]; then
            "$executable" profile-status
          fi

      - name: Package Windows release archive
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          PLATFORM: ${{ matrix.label }}
        run: |
          New-Item -ItemType Directory -Force release | Out-Null
          $archive = "release/thermex-key-exporter-$env:PLATFORM.zip"
          Compress-Archive -Path dist/thermex-key-exporter, dist/ThermexKeyExporter -DestinationPath $archive -Force
          $hash = (Get-FileHash -Algorithm SHA256 $archive).Hash.ToLowerInvariant()
          "$hash  $([System.IO.Path]::GetFileName($archive))" | Set-Content release/SHA256SUMS.txt -NoNewline -Encoding ascii

      - name: Verify Windows release archive
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          PLATFORM: ${{ matrix.label }}
          PROFILE_KIND: ${{ steps.profile.outputs.kind }}
        run: |
          $archive = "release/thermex-key-exporter-$env:PLATFORM.zip"
          $extracted = Join-Path $env:RUNNER_TEMP ([guid]::NewGuid().ToString())
          Expand-Archive -Path $archive -DestinationPath $extracted
          $expectedNames = @("thermex-key-exporter", "ThermexKeyExporter")
          $entries = @(Get-ChildItem -Force $extracted)
          $unexpected = @($entries | Where-Object { $_.Name -notin $expectedNames })
          if ($entries.Count -ne 2 -or $unexpected.Count -ne 0) {
            throw "Windows release archive does not contain exactly the GUI and CLI directories."
          }
          $cli = Join-Path $extracted "thermex-key-exporter/thermex-key-exporter.exe"
          $gui = Join-Path $extracted "ThermexKeyExporter/ThermexKeyExporter.exe"
          if (-not (Test-Path -Path $cli -PathType Leaf) -or -not (Test-Path -Path $gui -PathType Leaf)) {
            throw "Windows release archive is missing a required executable."
          }
          & $cli --version
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          & $cli self-test
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          if ($env:PROFILE_KIND -eq "release-profile") {
            & $cli profile-status
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          }
          $env:THERMEX_GUI_IMPORT_CHECK = "1"
          & $gui
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Upload release archives
        uses: actions/upload-artifact@v7
        with:
          name: thermex-key-exporter-${{ matrix.label }}-${{ steps.profile.outputs.kind }}
          path: release/
          if-no-files-found: error

  create-release-draft:
    name: Create GitHub Release draft
    needs: package
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    concurrency:
      group: github-release-${{ github.repository }}-${{ github.ref_name }}
      cancel-in-progress: false
    permissions:
      actions: read
      contents: write

    steps:
      - name: Check out release tag
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Verify release tag and metadata
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: python scripts/check_release_version.py --tag "$RELEASE_TAG"

      - name: Download Windows release archive
        uses: actions/download-artifact@v8
        with:
          name: thermex-key-exporter-windows-x64-release-profile
          path: release-input/windows-x64

      - name: Download macOS release archive
        uses: actions/download-artifact@v8
        with:
          name: thermex-key-exporter-macos-arm64-release-profile
          path: release-input/macos-arm64

      - name: Download Linux release archive
        uses: actions/download-artifact@v8
        with:
          name: thermex-key-exporter-linux-x64-release-profile
          path: release-input/linux-x64

      - name: Verify and assemble release assets
        run: |
          python scripts/assemble_github_release_assets.py \
            --input-dir release-input \
            --output-dir release-assets
          (
            cd release-assets
            sha256sum -c SHA256SUMS.txt
          )

      - name: Extract release notes from changelog
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          python scripts/extract_release_notes.py \
            --version "${RELEASE_TAG#v}" \
            --output release-notes.md

      - name: Create verified GitHub Release draft
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "::error::A GitHub Release already exists for $RELEASE_TAG; it will not be changed automatically."
            exit 1
          fi
          gh release create "$RELEASE_TAG" \
            release-assets/thermex-key-exporter-windows-x64.zip \
            release-assets/thermex-key-exporter-macos-arm64.zip \
            release-assets/thermex-key-exporter-linux-x64.tar.gz \
            release-assets/SHA256SUMS.txt \
            --verify-tag \
            --draft \
            --title "Thermex Key Exporter ${RELEASE_TAG#v}" \
            --notes-file release-notes.md
          gh release view "$RELEASE_TAG" --json url --jq .url
