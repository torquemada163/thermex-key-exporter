name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-22.04
          - windows-2022
          - macos-14

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install project
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest -q

      - name: Run self-test
        run: python -m thermex_key_exporter self-test

      - name: Run lint
        run: python -m ruff check src tests scripts packaging

      - name: Check formatting
        run: python -m ruff format --check src tests scripts packaging

      - name: Check text policy
        run: python scripts/check_text_policy.py

      - name: Build and smoke-test the Python CLI distribution
        run: |
          python scripts/build_python_distribution.py --synthetic-profile --clean
          python scripts/check_python_distribution.py --dist-dir dist/python --expect-profile --pipx
